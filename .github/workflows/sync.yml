name: 🔄 Auto Sync UpStream

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          # 获取上游仓库的完整克隆地址（例如 https://github.com/drawdb-io/drawdb.git）
          UPSTREAM_URL=$(gh api repos/${{ github.repository }} --jq '.parent.clone_url')
          
          if [ -z "$UPSTREAM_URL" ]; then
            echo "This repo does not have an upstream (it may not be a fork)."
            exit 1
          fi
          
          echo "Detected upstream: $UPSTREAM_URL"
          git remote add upstream "$UPSTREAM_URL" || true
          git fetch upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes in upstream (ignoring sync.yml)
        id: check_changes
        run: |
          git fetch upstream
          UPSTREAM_COMMITS=$(git rev-list --count HEAD..upstream/main)
          echo "Upstream commits ahead of main: $UPSTREAM_COMMITS"

          if [ "$UPSTREAM_COMMITS" -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Merge upstream into main
        if: env.has_changes == 'true'
        run: |
          git merge --no-ff --no-edit upstream/main

      - name: Push changes
        if: env.has_changes == 'true'
        run: |
          git push https://${{ secrets.ACTION_PAT }}@github.com/${{ github.repository }}.git main
